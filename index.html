<input type="text" id="videoUrl" placeholder="Dán link TikTok vào đây">
<button onclick="downloadVideo()">Tải video</button>

<script>
    function downloadVideo() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        if (!urlInput) return alert('Dán link vào đi b!');
        
        // Cách này không dùng fetch, nên sẽ không bị lỗi CORS chặn
        const downloadUrl = 'https://snaptik.app/en?url=' + encodeURIComponent(urlInput);
        window.open(downloadUrl, '_blank');
    }
</script>
