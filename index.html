<input type="text" id="videoUrl" placeholder="Dán link TikTok/Douyin">
<button onclick="downloadVideo()">Tải video</button>

<script>
    function downloadVideo() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        if (!urlInput) return alert('Dán link vào đi b!');
        
        // Gọi thẳng vào server Render của b
        const finalUrl = 'https://tai-video-pjtg.onrender.com/api?url=' + encodeURIComponent(urlInput);
        window.open(finalUrl, '_blank');
    }
</script>
